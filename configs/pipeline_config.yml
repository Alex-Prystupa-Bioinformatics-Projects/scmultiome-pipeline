# Pipeline Configuration
# Set species-specific genome settings here.
# This file is read by all pipeline step scripts.

# Species: "mouse" or "human"
species: mouse

# Genome build
genome: mm10

# EnsDb package name (must be installed in R)
ensdb: EnsDb.Mmusculus.v79

# Blacklist region set (from Signac)
# mouse: blacklist_mm10
# human: blacklist_hg38_unified
blacklist: blacklist_mm10

# -----------------------------------------------
# Human settings (comment out mouse, uncomment below):
# species: human
# genome: hg38
# ensdb: EnsDb.Hsapiens.v86
# blacklist: blacklist_hg38_unified
# -----------------------------------------------

# -----------------------------------------------
# Batch Correction (Step 7: normalize_reduce)
# -----------------------------------------------
# harmony_vars: metadata column(s) to batch correct on using Harmony.
# Set to "none" to skip batch correction entirely.
# Common choices: "Institution", "Sequencing_Date", or comma-separated e.g. "Institution,Sequencing_Date"
# IMPORTANT: Review your QC plots and sample metadata before deciding.
# If your samples come from multiple institutions or sequencing runs, batch correction is recommended.
harmony_vars: none

# -----------------------------------------------
# LinkPeaks (Step 11: linkpeaks)
# -----------------------------------------------
# linkpeaks_grouping_col: metadata column to split the object by before running
# LinkPeaks. One LSF job is submitted per unique value in this column.
# Set to "none" to run LinkPeaks on the full merged object (one job).
# Common choices:
#   none                → full object, one job
#   orig.ident          → one job per sample
#   Annotation_Broad    → one job per cell type
#   Sample_Celltype     → one job per sample × cell type combination
linkpeaks_grouping_col: none
# linkpeaks_genes: whether to run LinkPeaks on all genes or SCT variable features only.
# variable_features is much faster and recommended for testing.
# Options: "all", "variable_features"
linkpeaks_genes: all
